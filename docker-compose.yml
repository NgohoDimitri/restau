name: restiq

services:

  app:
   build:
    context: .
    dockerfile: dockerfile
   image: restiq-image
   container_name: restiq-container
   ports:
    - "8000:8000"
   volumes:
    - .:/app

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - app
